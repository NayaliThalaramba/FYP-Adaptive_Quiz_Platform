<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard | Adaptive Learning</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Averia Sans Libre", sans-serif;
            min-height: 100vh;
            margin: 0;
            background: #F5F7F6;
            color: #222;
            padding: 40px 20px 120px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            z-index: 2;
            position: relative;
        }

        h1 {
            color: #E9650E;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 20px 0;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .stats-card {
            position: relative;
            padding-top: 90px;
        }

        .admin-mascot-inside {
            position: absolute;
            top: -65px;
            left: -42px;
            width: 190px;
            height: auto;
            opacity: 0.95;
            pointer-events: none;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .stat {
            background: #f3fbfb;
            border: 1px solid #cfeaea;
            border-radius: 18px;
            padding: 20px 30px;
            min-width: 200px;
        }

        .stat-label {
            font-size: 15px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #249EA0;
        }

        h3 {
            color: #E9650E;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        a {
            text-decoration: none;
            color: #E9650E;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
            color: #249EA0;
        }

        .bottom-wave {
            position: fixed;
            bottom: -40px;
            left: 0;
            width: 100%;
            height: 220px;
            z-index: 0;
            pointer-events: none;
        }

        .bottom-wave svg {
            width: 100%;
            height: 100%;
        }

        .top-right-nav {
            position: fixed;
            top: 20px;
            right: 40px;
            z-index: 3;
        }

        .top-right-nav a {
            text-decoration: none;
            background: #249EA0;
            padding: 10px 22px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            border-bottom: 4px solid #005F60;
            transition: 0.3s;
        }

        .top-right-nav a:hover {
            background: #35b4b6;
            transform: translateY(-2px);
            border-bottom: 4px solid #0b5152;
            text-decoration: none;
            color: white;
        }

        @media (max-width: 768px) {
            .stat {
                width: 80%;
            }

            .admin-mascot-inside {
                width: 85px;
                top: 16px;
                left: 16px;
            }

            .stats-card {
                padding-top: 80px;
            }

            .admin-video {
                width: 160px;
                height: 130px;
                right: 15px;
                bottom: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="top-right-nav">
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <div class="page-container">

        <h1>Admin Analytics Dashboard</h1>

        <div class="card stats-card">
            <img src="/static/images/admin.png" class="admin-mascot-inside">

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value">{{ total_users }}</div>
                </div>

                <div class="stat">
                    <div class="stat-label">Total Quiz Attempts</div>
                    <div class="stat-value">{{ total_attempts }}</div>
                </div>

                <div class="stat">
                    <div class="stat-label">Average Engagement</div>
                    <div class="stat-value">{{ avg_engagement }}</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Reward Distribution</h3>
            <div id="rewardChart"></div>
        </div>

        <div class="card">
            <h3>Engagement Trend</h3>
            <div id="engagementChart"></div>
        </div>

    </div>

    <div class="bottom-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#E9650E"
                d="M0,192C120,150,240,130,360,154.7C480,181,600,256,720,261.3C840,267,960,203,1080,176C1200,149,1320,160,1440,192L1440,320L0,320Z">
            </path>
        </svg>
    </div>

    <script>
        const rewards = JSON.parse('{{ reward_counts | tojson | safe }}');

        const data = [{
            labels: Object.keys(rewards),
            values: Object.values(rewards),
            type: 'pie',
            hole: 0.4,
            marker: {
                colors: ['#E9650E', '#249EA0', '#FEA719', '#7ccfd0', '#B8540A']
            }
        }];

        Plotly.newPlot('rewardChart', data, {
            title: {
                text: 'Gamification Reward Distribution',
                font: { color: '#E9650E', family: 'Averia Sans Libre, sans-serif' }
            },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#222', family: 'Averia Sans Libre, sans-serif' }
        });

        const engagementTrend = JSON.parse('{{ engagement_trend | tojson | safe }}');

        const trendData = [{
            x: Object.keys(engagementTrend),
            y: Object.values(engagementTrend),
            type: 'scatter',
            mode: 'lines+markers',
            name: 'Engagement',
            line: { color: '#249EA0', shape: 'spline' },
            marker: { color: '#E9650E' }
        }];

        Plotly.newPlot('engagementChart', trendData, {
            title: {
                text: 'Student Engagement Over Time',
                font: { color: '#E9650E', family: 'Averia Sans Libre, sans-serif' }
            },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#222', family: 'Averia Sans Libre, sans-serif' },
            xaxis: {
                title: 'Date',
                type: 'category',
                color: '#005F60',
                gridcolor: '#d7eeee',
                zerolinecolor: '#d7eeee'
            },
            yaxis: {
                title: 'Total Engagement',
                tickformat: ".2f",
                color: '#005F60',
                gridcolor: '#d7eeee',
                zerolinecolor: '#d7eeee'
            },
            legend: {
                font: { color: '#222' }
            }
        });
    </script>

</body>

</html>
