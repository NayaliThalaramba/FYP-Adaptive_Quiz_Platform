<!DOCTYPE html>
<html>

<head>
    <title>Register | Adaptive Learning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("/static/images/Welcome.jpeg");
            background-size: cover;
            background-position: center;
        }

        .card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 25px;
            background: #E9650E;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #FEA719;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #E9650E;
            font-weight: bold;
        }

        .register-mascot {
            position: fixed;
            bottom: 5px;
            right: 100px;
            width: 380px;
            opacity: 0.95;
            z-index: 500;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .flash-message {
            width: 90%;
            margin: 0 auto 15px auto;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .flash-message.error {
            background: #ffe0e0;
            color: #b30000;
            border: 1px solid #ffb3b3;
        }

        .flash-message.success {
            background: #e6ffe6;
            color: #0f7a0f;
            border: 1px solid #a8e6a8;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .password-wrapper input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding-right: 42px;
        }

        .toggle-password {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Create Account</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input name="first_name" placeholder="First Name" required>
            <input name="last_name" placeholder="Last Name" required>
            <input name="email" type="email" placeholder="Email" required>
            <input name="username" placeholder="Username" required>
            <div class="password-wrapper">
                <input id="registerPassword" name="password" type="password" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('registerPassword', this)"></i>
            </div>

            <div class="password-wrapper">
                <input id="confirmPassword" name="confirm_password" type="password" placeholder="Confirm Password"
                    required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
            </div>
            <button type="submit">Register</button>
        </form>
        <a href="{{ url_for('login') }}">Already have an account? Login</a>
    </div>
    <img src="/static/images/login.png" class="register-mascot">
</body>
<script>
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }
</script>

</html>
