<!DOCTYPE html>
<html>

<head>
    <title>Login | Adaptive Learning</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Averia Sans Libre", sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F5F7F6;
            overflow: hidden;
            position: relative;
            padding: 24px 20px 110px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 40px;
            width: 380px;
            max-width: 100%;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            z-index: 2;
            position: relative;
            overflow: visible;
            box-sizing: border-box;
        }

        .login-mascot {
            position: absolute;
            top: -150px;
            right: -135px;
            width: 300px;
            height: auto;
            z-index: 3;
            pointer-events: none;
        }

        h1 {
            font-weight: 700;
            font-size: 2.4em;
            margin: 0 0 25px;
            color: #E9650E;
            line-height: 1.1;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #cfeaea;
            font-size: 15px;
            background: #fff;
            color: #222;
            box-sizing: border-box;
            font-family: "Averia Sans Libre", sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #249EA0;
            box-shadow: 0 0 0 2px rgba(36, 158, 160, 0.12);
        }

        button {
            width: 90%;
            padding: 12px;
            margin-top: 18px;
            border: none;
            border-radius: 25px;
            background: #249EA0;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 5px solid #005F60;
            font-family: "Averia Sans Libre", sans-serif;
        }

        button:hover {
            background: #35b4b6;
            transform: translateY(-2px);
            border-bottom: 5px solid #0b5152;
        }

        a {
            display: block;
            margin-top: 18px;
            text-decoration: none;
            color: #E9650E;
            font-size: 15px;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
            color: #249EA0;
        }

        .flash-message {
            width: 90%;
            margin: 0 auto 15px auto;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .flash-message.error {
            background: #ffe0e0;
            color: #b30000;
            border: 1px solid #ffb3b3;
        }

        .flash-message.success {
            background: #e6fff7;
            color: #0a6c5d;
            border: 1px solid #a8e6dc;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .password-wrapper input {
            width: 90%;
            padding-right: 42px;
        }

        .toggle-password {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #777;
        }

        .toggle-password:hover {
            color: #249EA0;
        }

        .bottom-wave {
            position: fixed;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 260px;
            z-index: 0;
            pointer-events: none;
        }

        .bottom-wave svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .bg-image {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            opacity: 0.95;
            transform-origin: center center;
            will-change: transform;
        }

        .bg-1 {
            top: 45px;
            left: 55px;
            width: 190px;
        }

        .bg-2 {
            top: 90px;
            right: 110px;
            width: 160px;
        }

        .bg-3 {
            bottom: 150px;
            left: 110px;
            width: 190px;
        }

        .bg-4 {
            bottom: 180px;
            right: 75px;
            width: 165px;
        }

        @media (max-width: 1024px) {
            .card {
                width: 350px;
                padding: 34px 28px;
            }

            .login-mascot {
                width: 235px;
                top: -110px;
                right: -95px;
            }

            h1 {
                font-size: 2.15em;
                margin-bottom: 20px;
            }

            input,
            button,
            .password-wrapper input,
            .flash-message {
                width: 92%;
            }

            .bg-1 {
                width: 140px;
                top: 35px;
                left: 30px;
            }

            .bg-2 {
                width: 125px;
                top: 70px;
                right: 45px;
            }

            .bg-3 {
                width: 140px;
                bottom: 130px;
                left: 35px;
            }

            .bg-4 {
                width: 130px;
                bottom: 150px;
                right: 35px;
            }

            .bottom-wave {
                height: 220px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 16px 95px;
            }

            .card {
                width: 330px;
                padding: 28px 22px;
            }

            .login-mascot {
                width: 170px;
                top: -75px;
                right: -58px;
            }

            h1 {
                font-size: 2em;
                margin-bottom: 18px;
            }

            input {
                font-size: 14px;
                padding: 11px;
            }

            button {
                font-size: 15px;
                padding: 11px;
            }

            a {
                font-size: 14px;
                margin-top: 16px;
            }

            .flash-message {
                font-size: 13px;
                padding: 10px;
            }

            .toggle-password {
                right: 26px;
                font-size: 16px;
            }

            .bg-1 {
                width: 90px;
                top: 28px;
                left: 16px;
            }

            .bg-2 {
                width: 82px;
                top: 52px;
                right: 18px;
            }

            .bg-3 {
                width: 90px;
                bottom: 120px;
                left: 18px;
            }

            .bg-4 {
                width: 84px;
                bottom: 128px;
                right: 16px;
            }

            .bottom-wave {
                height: 185px;
                bottom: -18px;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 16px 12px 85px;
            }

            .card {
                width: 300px;
                padding: 24px 18px;
            }

            .login-mascot {
                width: 130px;
                top: -55px;
                right: -38px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 16px;
            }

            input,
            button,
            .password-wrapper input,
            .flash-message {
                width: 94%;
            }

            input {
                padding: 10px;
                font-size: 14px;
            }

            button {
                padding: 10px;
                font-size: 14px;
                margin-top: 16px;
            }

            a {
                font-size: 13px;
                margin-top: 14px;
            }

            .flash-message {
                font-size: 12.5px;
                padding: 9px;
                margin-bottom: 12px;
            }

            .toggle-password {
                right: 20px;
                font-size: 15px;
            }

            .bg-1 {
                width: 58px;
                top: 22px;
                left: 10px;
            }

            .bg-2 {
                width: 54px;
                top: 38px;
                right: 10px;
            }

            .bg-3 {
                width: 58px;
                bottom: 105px;
                left: 10px;
            }

            .bg-4 {
                width: 54px;
                bottom: 110px;
                right: 10px;
            }

            .bottom-wave {
                height: 150px;
                bottom: -14px;
            }
        }
    </style>
</head>

<body>
    <img src="/static/images/trophy.png" alt="" class="bg-image bg-1">
    <img src="/static/images/fire.png" alt="" class="bg-image bg-2">
    <img src="/static/images/badges.png" alt="" class="bg-image bg-3">
    <img src="/static/images/star.png" alt="" class="bg-image bg-4">

    <div class="card">
        <img src="/static/images/login.png" alt="Login Mascot" class="login-mascot">

        <h1>Login</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input name="username" placeholder="Username" required>

            <div class="password-wrapper">
                <input id="loginPassword" name="password" type="password" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
            </div>

            <button type="submit">Login</button>
        </form>

        <a href="{{ url_for('register') }}">Don't have an account? Register</a>
    </div>

    <div class="bottom-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#E9650E"
                d="M0,192C120,150,240,130,360,154.7C480,181,600,256,720,261.3C840,267,960,203,1080,176C1200,149,1320,160,1440,192L1440,320L0,320Z">
            </path>
        </svg>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        const curvedImages = [
            {
                el: document.querySelector(".bg-1"),
                t: 0,
                step: 0.06,
                ampX: 40,
                ampY: 18,
                rotAmp: 18,
                phase: 0
            },
            {
                el: document.querySelector(".bg-2"),
                t: 1.2,
                step: 0.05,
                ampX: 32,
                ampY: 24,
                rotAmp: 15,
                phase: 1
            },
            {
                el: document.querySelector(".bg-3"),
                t: 2.1,
                step: 0.055,
                ampX: 36,
                ampY: 20,
                rotAmp: 20,
                phase: 2
            },
            {
                el: document.querySelector(".bg-4"),
                t: 0.7,
                step: 0.045,
                ampX: 28,
                ampY: 26,
                rotAmp: 16,
                phase: 3
            }
        ];

        function updateCurvedPositions() {
            curvedImages.forEach((item) => {
                const x = item.ampX * Math.cos(item.t + item.phase);
                const y = item.ampY * Math.sin((item.t * 1.4) + item.phase);
                const rotate = item.rotAmp * Math.sin(item.t + item.phase);

                item.el.style.transform = `translate(${x}px, ${y}px) rotate(${rotate}deg)`;
            });
        }

        updateCurvedPositions();

        document.addEventListener("mousemove", () => {
            curvedImages.forEach((item) => {
                item.t += item.step;
            });
            updateCurvedPositions();
        });
    </script>

</body>

</html>
