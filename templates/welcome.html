<!DOCTYPE html>
<html>

<head>
    <title>Welcome | Adaptive Learning Platform</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            margin: 0;
            background: #F5F7F6;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            max-width: 700px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            position: relative;
        }

        h1 {
            font-family: "Averia Sans Libre", sans-serif;
            font-weight: 700;
            font-style: normal;
            font-size: 3.5em;
            margin-bottom: 20px;
            color: #E9650E;
        }

        p {
            font-family: "Averia Sans Libre", sans-serif;
            font-weight: 400;
            font-style: italic;
            font-size: 1.2em;
            margin-bottom: 35px;
            color: #222;
            line-height: 1.7;
            max-width: 600px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            background: #E9650E;
            padding: 14px 36px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
            border-bottom: 5px solid #B8540A;
        }

        .btn:hover {
            background: #FEA719;
            transform: translateY(-2px);
            border-bottom: 5px solid #C96A12;
        }

        .floating-video {
            position: fixed;
            width: 350px;
            height: 450px;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            border-radius: 50% / 35%;
            animation: moveTopSides 12s infinite ease-in-out;
        }

        @keyframes moveTopSides {
            0% {
                top: 30px;
                left: calc(100% - 420px);
                opacity: 1;
            }

            45% {
                top: 30px;
                left: 40px;
                opacity: 1;
            }

            50% {
                top: 30px;
                left: 40px;
                opacity: 1;
            }

            95% {
                top: 30px;
                left: calc(100% - 420px);
                opacity: 1;
            }

            100% {
                top: 30px;
                left: calc(100% - 420px);
                opacity: 1;
            }
        }

        .bottom-wave {
            position: fixed;
            bottom: -40px;
            left: 0;
            width: 100%;
            height: 220px;
            z-index: 0;
            pointer-events: none;
        }

        .bottom-wave svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <video class="floating-video" autoplay muted loop playsinline>
        <source src="/static/videos/welcome-video.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>Adaptive Learning Platform</h1>
        <p>
            A personalized learning environment that dynamically adapts rewards
            using machine learning, reinforcement learning, and explainable AI
            to improve student engagement during quizzes.
        </p>

        <div class="button-group">
            <a class="btn" href="{{ url_for('login') }}">Login</a>
            <a class="btn" href="{{ url_for('register') }}">Register</a>
        </div>
    </div>

    <div class="bottom-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#E9650E"
                d="M0,192C120,150,240,130,360,154.7C480,181,600,256,720,261.3C840,267,960,203,1080,176C1200,149,1320,160,1440,192L1440,320L0,320Z">
            </path>
        </svg>
    </div>
</body>

</html>
